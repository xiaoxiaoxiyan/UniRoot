name: Build UniRoot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.11.1'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Download Root Provider Binaries
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        chmod +x scripts/download_binaries.sh
        bash scripts/download_binaries.sh

    - name: List Downloaded Assets
      run: find app/src/main/assets -type f | sort

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Verify APK Signing
      run: |
        APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
        if [ -n "$APK" ]; then
          echo "Verifying signing for: $APK"
          keytool -printcert -jarfile "$APK" 2>&1 | head -10 || true
          unzip -l "$APK" | grep "META-INF/.*\.\(RSA\|SF\|MF\)" || true
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: uniroot-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: uniroot-release
        path: app/build/outputs/apk/release/*.apk
